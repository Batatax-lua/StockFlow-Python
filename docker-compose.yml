services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://stockflow:stockflow123@db:5432/stockflow
    depends_on:
      db:
        condition: service_healthy
  db:
      image: postgres:15
      environment:
        POSTGRES_USER: stockflow
        POSTGRES_PASSWORD: stockflow123
        POSTGRES_DB: stockflow
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U stockflow -d stockflow"]
        interval: 5s
        timeout: 5s
        retries: 5

volumes:
    postgres_data: