<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StockFlow</title>
    <link rel="stylesheet" href="style.css"></link>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-wrap" id="loginWrap">
        <div class="login-box">
            <h1>StockFlow</h1>
            <p id="loginSubtitle">Acesse sua conta</p>
            <div class="field"><label>Usuário</label><input id="authUsername" placeholder="seu_usuario" /></div>
            <div class="field"><label>Senha</label><input id="authPassword" type="password" placeholder="senha" /></div>
            <div class="error-msg" id="authError"></div>

            <button class="btn" onclick="submitAuth()">Entrar</button>
            <div class="toggle">Ainda não possui uma conta? <span onclick="toggleAuthMode()">Cadastrar</span></div>
        </div>
    </div>

    <!-- APP -->
    <div class="app" id="appWrap" style="display:none">
        <nav>
            <div class="logo">⚡ StockFlow</div>
            <button onclick="showSection('dashboard')" id="nav-dashboard">Dashboard</button>
            <button onclick="showSection('products')" id="nav-products">Produtos</button>
            <button onclick="showSection('sales')" id="nav-sales">Nova Venda</button>
            <button onclick="logout()" style="margin-top:auto; color:#da6767">Sair</button>
        </nav>
    
        <main>
            <!-- DASHBOARD -->
            <div class="section" id="section-dashboard">
                <h1>Dashboard</h1>
                <div class="cards">
                    <div class="card">
                        <div class="label">Faturamento Total</div>
                        <div class="value" id="d-revenue">-</div>
                    </div>
                    <div class="card">
                        <div class="label">Vendas</div>
                        <div class="value" id="d-sales">-</div>
                    </div>
                    <div class="card">
                        <div class="label">Produtos</div>
                        <div class="value" id="d-products">-</div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="table-wrap" style="padding:1.5rem">
                        <h2>Melhores Produtos</h2>
                        <ul class="top-list" id="d-top"></ul>
                    </div>
                    <div class="table-wrap" style="padding:1.5rem">
                        <h2>⚠️ Estoque Baixo</h2>
                        <ul class="top-list" id="d-lowstock"></ul>
                    </div>
                </div>
            </div>

            <!-- PRODUTOS -->
            <div class="section" id="section-products">
                <h1>Produtos</h1>
                <div class="form-box">
                    <div class="field">
                        <label>Nome</label><input id="p-name" placeholder="Ex.: Café" />
                    </div>
                    <div class="field">
                        <label>Descrição</label><input id="p-desc" placeholder="Opcional" />
                    </div>
                    <div class="field">
                        <label>Preço (R$)</label><input id="p-price" type="number" step="0.01" placeholder="0.00" />
                    </div>
                    <div class="field">
                        <label>Estoque</label><input id="p-stock" type="number" placeholder="0" />
                    </div>
                    <button class="btn" id="p-submit-btn" onclick="createProduct()">Adicionar</button>
                    <button class="btn" id="p-cancel-btn" onclick="cancelEdit()" style="display:none; background:#475569">Cancelar</button>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>ID</th><th>Nome</th><th>Descrição</th><th>Preço</th><th>Estoque</th><th></th></tr></thead>
                        <tbody id="products-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- VENDAS -->
             <div class="section" id="section-sales">
                <h1>Nova Venda</h1>
                <div class="form-box">
                    <div class="field">
                        <label>Produto</label>
                        <select id="s-product"></select>
                    </div>
                    <div class="field">
                        <label>Quantidade</label>
                        <input id="s-qty" type="number" min="1" value="1" style="min-width:100px;"/>
                    </div>
                    <button class="btn" onclick="addSaleItem()">+ Adicionar Item</button>
                </div>
                <div class="table-wrap" style="margin-bottom:1rem">
                    <table>
                        <thead><tr><th>Produto</th><th>Qtd.</th><th>Preço Unit.</th><th>Subtotal</th><th></th></tr></thead>
                        <tbody id="sale-items-tbody"></tbody>
                    </table>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-size:1.1rem">Total: <strong id="sale-total" style="color:#7c6af7">R$ 0,00</strong></div>
                    <button class="btn" onclick="submitSale()">Finalizar Venda</button>
                </div>
             </div>
        </main>
    </div>

    <script>
        const API = ''
        let token = localStorage.getItem('sf_token') || null
        let isRegisterMode = false
        let saleItems = []
        let allProducts = []
        let editingProductId = null

        // Auth ---------------------------------------------
        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode
            document.getElementById('loginSubtitle').textContent = isRegisterMode ? 'Criar nova conta' : 'Acesse sua conta'
            document.querySelector('.toggle').innerHTML = isRegisterMode
                ? 'Já tem conta? <span onclick="toggleAuthMode()">Acessar</span>'
                : 'Não tem conta? <span onclick="toggleAuthMode()">Cadastrar</span>'
            document.getElementById('authError').textContent = ''
        }

        async function submitAuth() {
            const username = document.getElementById('authUsername').value.trim()
            const password = document.getElementById('authPassword').value
            if (!username || !password) return

            const endpoint = isRegisterMode ? '/auth/register' : '/auth/login'
            const res = await fetch(API + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({username, password})
            })

            if (isRegisterMode) {
                if (res.ok) {
                    toggleAuthMode()
                    document.getElementById('authError').style.color = '#86efac'
                    document.getElementById('authError').textContent = 'Conta criada com sucesso! Faça seu login'
                } else {
                    const err = await res.json()
                    document.getElementById('authError').style.color = '#fca5a5'
                    document.getElementById('authError').textContent = typeof err.detail === 'string' ? err.detail : 'Erro no cadastro'
                }
                return
            }

            if (res.ok) {
                const data = await res.json()
                token = data.access_token
                localStorage.setItem('sf_token', token)
                enterApp()
            } else {
                document.getElementById('authError').textContent = 'Usuário ou senha incorretos!'
            }
        }

        function logout() {
            token = null
            localStorage.removeItem('sf_token')
            document.getElementById('appWrap').style.display = 'none'
            document.getElementById('loginWrap').style.display = 'flex'
        }

        function enterApp() {
            document.getElementById('loginWrap').style.display = 'none'
            document.getElementById('appWrap').style.display = 'flex'
        }

        // Navegação ----------------------------------------
        function showSection(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
            document.querySelectorAll('nav button').forEach (b => b.classList.remove('active'))
            document.getElementById('section-' + name).classList.add('active')
            document.getElementById('nav-' + name).classList.add('active')
            if (name === 'dashboard') loadDashboard()
            if (name === 'products') loadProducts()
            if (name === 'sales') loadProductsForSale()
        }

        // Tools --------------------------------------------
        function authHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }
        }

        function fmtMoney(v) {
            return 'R$ ' + Number(v).toFixed(2).replace('.', ',')
        }

        // Dashboard ----------------------------------------
        async function loadDashboard() {
            const res = await fetch(API + '/dashboard/', { headers: authHeaders() })
            const data = await res.json()

            document.getElementById('d-revenue').textContent = fmtMoney(data.total_revenue)
            document.getElementById('d-sales').textContent = data.total_sales
            document.getElementById('d-products').textContent = data.total_products

            const topList = document.getElementById('d-top')
            topList.innerHTML = data.top_products.length
                ? data.top_products.map(p => `<li><span>${p.name}</span><span class="sold">${p.total_sold} vendidos</span></li>`).join('')
                : '<li class="empty">Nenhuma venda realizada ainda</li>'

            const lowRes = await fetch(API + '/products/low-stock?threshold=10', { headers: authHeaders() })
            const lowData = await lowRes.json()
            const lowList = document.getElementById('d-lowstock')
            lowList.innerHTML = lowData.length
                ? lowData.map(p => `<li><span>${p.name}</span><span class="badge low">${p.stock} un.</span></li>`).join('')
                : '<li style="color:#86efac; padding:0.6rem 0; font-size:0.9rem">Tudo certo por aqui</li>'
        }

        // Produtos -----------------------------------------
        async function loadProducts() {
            const res = await fetch(API + '/products/', { headers: authHeaders() })
            allProducts = await res.json()
            const tbody = document.getElementById('products-tbody')
            tbody.innerHTML = allProducts.length
                ? allProducts.map(p => `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.name}</td>
                        <td>${p.description || '-'}</td>
                        <td>${fmtMoney(p.price)}</td>
                        <td><span class="badge ${p.stock <= 10 ? 'low' : 'ok'}">${p.stock}</span></td>
                        <td style="display:flex; gap:0.5rem">
                            <button class="btn sm" onclick="editProduct(${p.id})">Editar</button>
                            <button class="btn danger sm" onclick="deleteProduct(${p.id})">Deletar</button>
                        </td>
                    </tr>`).join('')
                : '<tr><td colspan="6" class="empty">Nenhum produto cadastrado</td></tr>'
        }

        async function createProduct() {
            const name = document.getElementById('p-name').value.trim()
            const description = document.getElementById('p-desc').value.trim() || null
            const price = parseFloat(document.getElementById('p-price').value)
            const stock = parseInt(document.getElementById('p-stock').value)
            if (!name || isNaN(price) || isNaN(stock)) return alert('Preencha todos os campos obrigatórios!')

            if (editingProductId) {
                const res = await fetch(API + '/products/' + editingProductId, {
                    method: 'PUT',
                    headers: authHeaders(),
                    body: JSON.stringify({ name, description, price, stock })
                })
                if (res.ok) cancelEdit()
            } else {
                const res = await fetch(API + '/products/', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ name, description, price, stock })
                })
                if (res.ok) {
                    document.getElementById('p-name').value = ''
                    document.getElementById('p-desc').value = ''
                    document.getElementById('p-price').value = ''
                    document.getElementById('p-stock').value = ''
                }
            }
            loadProducts()
        }

        function editProduct(id) {
            const product = allProducts.find(p => p.id === id)
            if (!product) return

            editingProductId = id

            document.getElementById('p-name').value = product.name
            document.getElementById('p-desc').value = product.description || ''
            document.getElementById('p-price').value = product.price
            document.getElementById('p-stock').value = product.stock

            document.getElementById('p-submit-btn').textContent = 'Salvar'
            document.getElementById('p-cancel-btn').style.display = 'inline-block'

            document.querySelector('.form-box').scrollIntoView({ behavior: 'smooth' })
        }

        function cancelEdit() {
            editingProductId = null
            document.getElementById('p-name').value = ''
            document.getElementById('p-desc').value = ''
            document.getElementById('p-price').value = ''
            document.getElementById('p-stock').value = ''
            document.getElementById('p-submit-btn').textContent = 'Adicionar'
            document.getElementById('p-cancel-btn').style.display = 'none'
        }

        async function deleteProduct(id) {
            if (!confirm('Deseja mesmo apagar esse produto? Essa ação é irreversível')) return
            await fetch(API + '/products/' + id, { method: 'DELETE', headers: authHeaders() })
            loadProducts()
        }

        // Vendas -------------------------------------------
        function loadProductsForSale() {
            fetch(API + '/products/', { headers: authHeaders() })
                .then(r => r.json())
                .then(data => {
                    allProducts = data
                    const sel = document.getElementById('s-product')
                    sel.innerHTML = data.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name} - ${fmtMoney(p.price)}</option>`).join('')
                })
        }

        function addSaleItem() {
            const sel = document.getElementById('s-product')
            const qty = parseInt(document.getElementById('s-qty').value)
            if (!sel.value || isNaN(qty) || qty < 1) return

            const option = sel.options[sel.selectedIndex]
            const price = parseFloat(option.dataset.price)
            const existing = saleItems.find(i => i.product_id === parseInt(sel.value))

            if (existing) {
                existing.quantity += qty
            } else {
                saleItems.push({ product_id: parseInt(sel.value), name: option.text.split(' -')[0], quantity: qty, unit_price: price})
            }
            renderSaleItems()
        }

        function removeSaleItem(index) {
            saleItems.splice(index, 1)
            renderSaleItems()
        } 

        function renderSaleItems() {
            const tbody = document.getElementById('sale-items-tbody')
            const total = saleItems.reduce((acc, i) => acc + i.unit_price * i.quantity, 0)
            tbody.innerHTML = saleItems.length
                ? saleItems.map((i, idx) => `
                    <tr>
                        <td>${i.name}</td>
                        <td>${i.quantity}</td>
                        <td>${fmtMoney(i.unit_price)}</td>
                        <td>${fmtMoney(i.unit_price * i.quantity)}</td>
                        <td><button class="btn danger sm" onclick="removeSaleItem(${idx})">x</button></td>
                    </tr>`).join('')
                : '<tr><td colspan="5" class="empty">Nenhum produto adicionado</td></tr>'
            document.getElementById('sale-total').textContent = fmtMoney(total)
        }

        async function submitSale() {
            if (!saleItems.length) return alert('Adicione pelo menos um produto')
            const res = await fetch(API + '/sales/', {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ items: saleItems.map(i => ({ product_id: i.product_id, quantity: i.quantity })) })
            })
            if (res.ok) {
                saleItems = []
                renderSaleItems()
                alert('Venda cadastrada com sucesso!')
            } else {
                const err = await res.json()
                alert(err.detail || 'Erro ao cadastrar venda')
            }
        }

        // Init ---------------------------------------------
        if (token) {
            enterApp()
        }

    </script>
</body>
</html>
